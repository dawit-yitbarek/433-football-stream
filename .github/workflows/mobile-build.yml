name: EAS Mobile Build

on:
  push:
    tags:
      - "prod-*"
      - "preview-*"
      - "dev-*"
  workflow_dispatch:
    inputs:
      forced_profile:
        description: 'Manually select EAS Profile (Only used if triggered without a tag)'
        required: true
        default: 'preview'
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Run at root to fetch entire project history cleanly
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # Step 2: Run at root to successfully resolve monorepo subdirectory paths
      - name: Resolve Target Mobile Commit
        id: resolve-commit
        run: |
          echo "Finding last commit that altered mobile-app/..."
          LAST_MOBILE_COMMIT=$(git log -n 1 --max-count=1 --format="%H" -- mobile-app/ || echo "")
          
          if [ -z "$LAST_MOBILE_COMMIT" ]; then
            echo "⚠️ Warning: Git log couldn't resolve mobile-app history. Falling back to HEAD."
            LAST_MOBILE_COMMIT=$(git rev-parse HEAD)
          fi
          
          echo "Resolved Target Commit SHA: $LAST_MOBILE_COMMIT"
          echo "TARGET_SHA=$LAST_MOBILE_COMMIT" >> $GITHUB_ENV

      # Step 3: Run at root to process strings safely
      - name: Determine EAS Profile
        id: info
        run: |
          TAG_NAME="${{ github.ref_name }}"
          SHORT_SHA=$(echo "${{ env.TARGET_SHA }}" | cut -c1-7)

          if [[ "$TAG_NAME" == prod-* ]]; then
            echo "PROFILE=production" >> $GITHUB_ENV
          elif [[ "$TAG_NAME" == preview-* ]]; then
            echo "PROFILE=preview" >> $GITHUB_ENV
          elif [[ "$TAG_NAME" == dev-* ]]; then
            echo "PROFILE=development" >> $GITHUB_ENV
          else
            echo "PROFILE=${{ github.event.inputs.forced_profile }}" >> $GITHUB_ENV
          fi
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      # Standard Expo Setup (Node configuration requires path to lockfile)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: ./mobile-app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 4: Run at root so EAS CLI reads global workspace parameters safely
      - name: Validate Against Duplicate Builds
        run: |
          echo "Checking Expo history for Profile: ${{ env.PROFILE }} at Commit: ${{ env.TARGET_SHA }}"
          
          # Move inside to ensure EAS finds the app project context before scanning
          cd mobile-app
          EXISTING_BUILD=$(eas build:list --platform android --profile ${{ env.PROFILE }} --limit 15 --json | grep "${{ env.TARGET_SHA }}" || true)

          if [ -n "$EXISTING_BUILD" ]; then
            echo "❌ REJECTED: A build for profile '${{ env.PROFILE }}' on commit ${{ env.SHORT_SHA }} already exists in Expo."
            exit 1
          fi
          echo "✅ No prior build found for this mobile state. Safe to proceed."

      # Step 5: Scoped directly to mobile app dependency directory
      - name: Install dependencies
        working-directory: ./mobile-app
        run: npm install

      # Step 6: Full repository rollback followed by sub-directory execution
      - name: Build Android via EAS
        run: |
          echo "Switching entire repository state to target commit: ${{ env.TARGET_SHA }}"
          git checkout ${{ env.TARGET_SHA }}

          cd mobile-app
          eas build --platform android --profile ${{ env.PROFILE }} --message "Triggered by Tag: ${{ github.ref_name }} (Code State: ${{ env.SHORT_SHA }})" --non-interactive