name: EAS Mobile Build

on:
  push:
    tags:
      - "prod-*"
      - "preview-*"
      - "dev-*"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      # Step 1: A tag pushes & we check out the full git history
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential to trace back through past commits

      # Step 2: Directly grab the last commit that altered the 'mobile-app' folder
      - name: Resolve Target Mobile Commit
        id: resolve-commit
        run: |
          echo "Finding last commit that altered mobile-app/..."
          LAST_MOBILE_COMMIT=$(git log -n 1 --max-count=1 --format="%H" -- mobile-app/)
          echo "TARGET_SHA=$LAST_MOBILE_COMMIT" >> $GITHUB_ENV

      # Step 3: Check the profile attached with the tag
      - name: Determine EAS Profile
        id: info
        run: |
          TAG_NAME="${{ github.ref_name }}"
          SHORT_SHA=$(echo "${{ env.TARGET_SHA }}" | cut -c1-7)

          if [[ "$TAG_NAME" == prod-* ]]; then
            echo "PROFILE=production" >> $GITHUB_ENV
          elif [[ "$TAG_NAME" == preview-* ]]; then
            echo "PROFILE=preview" >> $GITHUB_ENV
          elif [[ "$TAG_NAME" == dev-* ]]; then
            echo "PROFILE=development" >> $GITHUB_ENV
          fi
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      # Standard Expo Setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: ./mobile-app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 4: Check if there was already a build with this profile for that target commit
      - name: Validate Against Duplicate Builds
        run: |
          echo "Checking Expo history for Profile: ${{ env.PROFILE }} at Commit: ${{ env.TARGET_SHA }}"

          # Query Expo for recent builds matching this profile
          EXISTING_BUILD=$(eas build:list --platform android --profile ${{ env.PROFILE }} --limit 15 --json | grep "${{ env.TARGET_SHA }}" || true)

          if [ -n "$EXISTING_BUILD" ]; then
            echo "❌ REJECTED: A build for profile '${{ env.PROFILE }}' on commit ${{ env.SHORT_SHA }} already exists in Expo."
            exit 1
          fi
          echo "✅ No prior build found for this mobile state. Safe to proceed."

      # Step 5: Trigger the build for the provided profile
      - name: Install dependencies
        run: npm install

      - name: Build Android via EAS
        # Override the default working directory back to root ($GITHUB_WORKSPACE)
        # so the entire repository reverts back to the target commit state cleanly.
        working-directory: ${{ github.workspace }}
        run: |
          echo "Switching entire repository state to target commit: ${{ env.TARGET_SHA }}"
          git checkout ${{ env.TARGET_SHA }}

          # Move into the mobile folder to execute the EAS command
          cd mobile-app
          eas build --platform android --profile ${{ env.PROFILE }} --message "Triggered by Tag: ${{ github.ref_name }} (Code State: ${{ env.SHORT_SHA }})" --non-interactive
